name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --clean
        env:
          CI: '1'
          EXPO_NO_TELEMETRY: '1'

      - name: Decrypt Signing Keystore
        # The keystore is committed ENCRYPTED (my-release-key.keystore.gpg at repo
        # root) and decrypted here with the KEYSTORE_PASSPHRASE secret. This avoids
        # shipping a ~3.6 KB base64 secret that gets truncated when pasted.
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.KEYSTORE_PASSPHRASE }}" \
            -d my-release-key.keystore.gpg > android/app/my-release-key.keystore
          echo "Decrypted keystore ($(wc -c < android/app/my-release-key.keystore) bytes)."

      - name: Validate Signing Keystore (fail fast)
        # Fails in seconds if the keystore is corrupt/undecryptable, instead of
        # after a 14-minute build at packageRelease.
        run: |
          keytool -list \
            -keystore android/app/my-release-key.keystore \
            -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" >/dev/null \
            || { echo "::error::Keystore unreadable — check KEYSTORE_PASSPHRASE and ANDROID_* secrets"; exit 1; }

      - name: Write Signing Properties
        # Prepend a newline so we never merge onto the file's last line
        # (gradle.properties ships without a trailing newline).
        run: |
          printf '\nMYAPP_UPLOAD_STORE_FILE=my-release-key.keystore\nMYAPP_UPLOAD_KEY_ALIAS=%s\nMYAPP_UPLOAD_STORE_PASSWORD=%s\nMYAPP_UPLOAD_KEY_PASSWORD=%s\n' \
            "${{ secrets.ANDROID_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/gradle.properties

      - name: Patch build.gradle for Release Signing
        run: node ci/patch-android-signing.js

      - name: Build Signed Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: SciPractice-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
