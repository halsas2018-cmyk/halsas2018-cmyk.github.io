name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --clean
        env:
          CI: '1'
          EXPO_NO_TELEMETRY: '1'

      - name: Decode Signing Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/my-release-key.keystore

      - name: Write Signing Properties
        # Prepend a newline so we never merge onto the file's last line
        # (gradle.properties ships without a trailing newline).
        run: |
          printf '\nMYAPP_UPLOAD_STORE_FILE=my-release-key.keystore\nMYAPP_UPLOAD_KEY_ALIAS=%s\nMYAPP_UPLOAD_STORE_PASSWORD=%s\nMYAPP_UPLOAD_KEY_PASSWORD=%s\n' \
            "${{ secrets.ANDROID_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/gradle.properties

      - name: Patch build.gradle for Release Signing
        run: node ci/patch-android-signing.js

      - name: Build Signed Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: SciPractice-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
